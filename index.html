<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carta de Bienvenida</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.carta{
background:rgba(0,0,0,0.6);
padding:50px;
border-radius:12px;
width:60%;
max-width:700px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
text-align:center;
}

h1{
letter-spacing:2px;
margin-bottom:10px;
}

.fecha{
margin-bottom:25px;
font-size:14px;
opacity:0.8;
}

.mensaje{
margin-top:20px;
line-height:1.6;
font-size:18px;
}

.firma{
margin-top:40px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="carta">

<h1 id="empresa"></h1>

<div class="fecha">
Fecha: <span id="fecha"></span>
</div>

<h2>Bienvenido <span id="empleado"></span></h2>

<p class="mensaje" id="mensaje"></p>

<div class="firma">
Atentamente<br>
<span id="emisor"></span>
</div>

</div>

<script>

fetch("carta.json")
.then(response => response.json())
.then(data => {

document.getElementById("empresa").innerText =
data.cartaBienvenida.empresa.nombre

document.getElementById("fecha").innerText =
data.cartaBienvenida.fecha.dia + " " +
data.cartaBienvenida.fecha.mes + " " +
data.cartaBienvenida.fecha.anio

document.getElementById("empleado").innerText =
data.cartaBienvenida.empleado.nombre

document.getElementById("mensaje").innerText =
data.cartaBienvenida.mensaje

document.getElementById("emisor").innerText =
data.cartaBienvenida.emisor.nombre

})

</script>

</body>
</html>
